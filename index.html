<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ລະບົບຄິດໄລ່ເງິນເດືອນນາຍແລະພົນທະຫານສະເພາະບຸກຄົນ 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath+OT:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f2d1f;
            --primary-mid: #1b4332;
            --primary-light: #2d6a4f;
            --accent: #d4a017;
            --accent-light: #f4d03f;
            --income-bg: #f0fdf4;
            --special-bg: #eff6ff;
            --deduct-bg: #fef2f2;
            --bg: #f8faf6;
            --card: #ffffff;
            --text: #1a2e1a;
            --text-muted: #5a7a5a;
            --border: #d1e8d1;
            --shadow-lg: 0 10px 40px rgba(15,45,31,0.18);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Phetsarath OT', serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* ===== LOGIN OVERLAY ===== */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px 25px; border-radius: var(--radius); width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow-lg); }
        .login-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; }

        /* ===== HEADER (ຈັດຢູ່ເຄິ່ງກາງ) ===== */
        .app-header { 
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%); 
            color: white; 
            padding: 50px 20px 80px; 
            position: relative; 
            overflow: hidden;
            text-align: center; /* ຈັດຂໍ້ຄວາມຢູ່ເຄິ່ງກາງ */
        }
        .header-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        /* ກ່ອງສະບາຍດີ (Center) */
        .greeting-box { 
            margin-bottom: 25px; 
            border-left: 5px solid var(--accent); 
            padding: 5px 20px; 
            display: none; 
            text-align: left; /* ໃຫ້ຂໍ້ຄວາມສະບາຍດີຊິດຕົວຂີດສີເຫຼືອງ */
            align-self: center;
        }
        .header-badge { 
            display: inline-flex; 
            align-items: center;
            gap: 8px;
            background: rgba(212,160,23,0.15); 
            border: 1px solid rgba(212,160,23,0.3); 
            color: var(--accent-light); 
            font-size: 0.85em; 
            padding: 6px 16px; 
            border-radius: 30px; 
            margin-bottom: 20px; 
        }
        .header-title { 
            font-size: clamp(1.5em, 6vw, 2.5em); 
            font-weight: bold; 
            line-height: 1.2; 
            margin-bottom: 25px;
            max-width: 90%;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.85em;
            font-family: inherit;
            transition: 0.3s;
        }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; }

        /* ===== TABS & BODY (ຄືເກົ່າ) ===== */
        .tab-bar-wrap { position: sticky; top: 0; z-index: 100; padding: 0 16px; margin-top: -28px; }
        .tab-bar { display: flex; gap: 8px; background: white; border-radius: 50px; padding: 6px; box-shadow: var(--shadow-lg); max-width: 640px; margin: 0 auto; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 44px; background: transparent; color: var(--text-muted); font-weight: bold; cursor: pointer; font-size: 0.85em; font-family: inherit; }
        .tab-btn.active { background: var(--primary); color: white; }

        .app-body { max-width: 680px; margin: 0 auto; padding: 20px 16px; flex: 1; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
        .card-header { padding: 12px 20px; font-weight: bold; font-size: 0.9em; }
        .card-header.income { background: var(--income-bg); color: #166534; }
        .card-header.special { background: var(--special-bg); color: #1d4ed8; }
        .card-header.deduct { background: var(--deduct-bg); color: #991b1b; }
        .card-body { padding: 18px 20px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75em; font-weight: bold; color: var(--text-muted); margin-bottom: 5px; }
        select, input { width: 100%; padding: 11px 13px; border: 1.2px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 0.92em; outline: none; background: #fafafa; }

        .result-panel { background: linear-gradient(160deg, #0f2d1f 0%, #1b4332 100%); color: white; border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow-lg); }
        .res-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .res-row { display: flex; justify-content: space-between; font-size: 0.82em; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .pos { color: #86efac; } .neg { color: #fca5a5; }
        .net-section { border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px; text-align: center; }
        .net-val { font-size: 2.5em; font-weight: bold; color: var(--accent-light); }

        .app-footer { text-align: center; padding: 30px 20px; width: 100%; max-width: 680px; margin: 0 auto; }
        .footer-card { display: inline-flex; align-items: center; gap: 12px; background: white; border: 1px solid var(--border); border-radius: 50px; padding: 8px 18px 8px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .footer-avatar { width: 35px; height: 35px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8em; font-weight: bold; color: var(--accent-light); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div style="font-size: 45px; margin-bottom: 10px;">🛡️</div>
        <h2 style="color:var(--primary); margin-bottom:20px;">ເຂົ້າສູ່ລະບົບ 2026</h2>
        <input list="units" id="u_id" class="login-input" placeholder="ເລືອກ ຫຼື ພິມ ID ກົມກອງ">
        <datalist id="units">
            <option value="100"> <option value="101"> <option value="102"> <option value="103"> <option value="104"> <option value="105"> <option value="106"> <option value="107"> <option value="168"> <option value="201"> <option value="202"> <option value="203"> <option value="204"> <option value="205"> <option value="301"> <option value="302"> <option value="303"> <option value="304"> <option value="305"> <option value="306"> <option value="307"> <option value="308"> <option value="309"> <option value="310"> <option value="311"> <option value="312"> <option value="313"> <option value="314"> <option value="315"> <option value="316"> <option value="317"> <option value="318"> <option value="401"> <option value="402"> <option value="403"> <option value="404"> <option value="405"> <option value="406"> <option value="407"> <option value="408"> <option value="409"> <option value="410"> <option value="412"> <option value="413"> <option value="414"> <option value="415"> <option value="416"> <option value="418"> <option value="419"> <option value="420"> <option value="421"> <option value="501"> <option value="502"> <option value="503"> <option value="504"> <option value="505"> <option value="506"> <option value="507"> <option value="508"> <option value="509"> <option value="510"> <option value="511"> <option value="512"> <option value="513"> <option value="514"> <option value="515"> <option value="516"> <option value="517"> <option value="518"> <option value="519"> <option value="520"> <option value="521"> <option value="601"> <option value="602"> <option value="603"> <option value="604"> <option value="605"> <option value="908">
        </datalist>
        <input type="password" id="u_pass" class="login-input" placeholder="ພິມລະຫັດຜ່ານ">
        <button onclick="login()" id="btn-login" class="login-btn">ຢືນຢັນການເຂົ້າໃຊ້</button>
        <p id="login-msg" style="color:red; margin-top:10px; font-size:0.85em;"></p>
    </div>
</div>

<div class="app-header">
    <div class="header-inner">
        <div id="greeting-area" class="greeting-box">
            <div style="font-size: 1.5em; font-weight: bold; color: var(--accent-light);">ສະບາຍດີ, <span id="display-unit-name"></span>!</div>
            <div style="font-size: 0.95em; opacity: 0.9; margin-top: 5px;">ທ່ານເຂົ້າສູ່ລະບົບສຳເລັດແລ້ວ</div>
        </div>

        <div class="header-badge">
            <span style="font-size:1.2em;">📄</span> ເອກະສານ 360/ກປທ · 2026
        </div>

        <div class="header-title">
            ລະບົບຄິດໄລ່ເງິນເດືອນ<br>ນາຍແລະພົນທະຫານສະເພາະບຸກຄົນ

        <button onclick="logout()" class="logout-btn">ອອກຈາກລະບົບ</button>
    </div>
</div>

<div class="tab-bar-wrap">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this,'tab-inc')">💰 ລາຍຮັບ</button>
        <button class="tab-btn" onclick="switchTab(this,'tab-pol')">🎖 ນະໂຍບາຍ</button>
        <button class="tab-btn" onclick="switchTab(this,'tab-ded')">➖ ລາຍຫັກ</button>

</div>

<div class="app-body">

                        <option value="3876000">5 — ພັນເອກ (3,876,000)</option>
                        <option value="3401000">6 — ພັນໂທ (3,401,000)</option>
                        <option value="3068500">7 — ພັນຕີ (3,068,500)</option>
                        <option value="2926000">8 — ຮ້ອຍເອກ (2,926,000)</option>
                        <option value="2812000" selected>9 — ຮ້ອຍໂທ (2,812,000)</option>
                        <option value="2736000">10 — ຮ້ອຍຕີ (2,736,000)</option>
                        <option value="2679000">11 — ວາທີ (2,679,000)</option>
                        <option value="2650500">12 — ສິບເອກ (2,650,500)</option>
                        <option value="2631500">13 — ສິບໂທ (2,631,500)</option>
                        <option value="2574500">14 — ສິບຕີ (2,574,500)</option>
                        <option value="2555500">15 — ຊັ້ນ I (2,555,500)</option>

                        <option value="2500000">ຂັ້ນ 3: ຫົວໜ້າກົມໃຫຍ່ (2,500,000)</option>
                        <option value="2300000">ຂັ້ນ 4: ຮອງກົມໃຫຍ່, ຫົວໜ້າກົມ (2,300,000)</option>
                        <option value="2000000">ຂັ້ນ 5: ຮອງກົມ, ຫົວໜ້າກອງພົນ (2,000,000)</option>
                        <option value="1500000">ຂັ້ນ 6: ຫົວໜ້າພະແນກກົມໃຫຍ່ (1,500,000)</option>

                        <option value="750000">ຂັ້ນ 7ຍ: ຮອງກອງພັນໃຫຍ່ (750,000)</option>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9t2ZImkVWxiyaU5QnnSuEYdUQzFZLrx-3YP3htp7L60SHmOyW4wLnrzI7g1DDFKIB/exec';
    let currentUnit = "";

    async function login() {
        const id = document.getElementById('u_id').value;
        const pass = document.getElementById('u_pass').value;
        const btn = document.getElementById('btn-login');
        if(!id || !pass) return alert("ປ້ອນຂໍ້ມູນໃຫ້ຄົບ");
        btn.innerText = "ກຳລັງກວດສອບ..."; btn.disabled = true;
        try {
            const resp = await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({id:id, password:pass, action:"login"})});
            const res = await resp.json();
            if(res.status === "success") {
                currentUnit = res.unit;
                document.getElementById('display-unit-name').innerText = res.unit;
                document.getElementById('greeting-area').style.display = 'block';
                document.getElementById('login-overlay').style.display = 'none';
                calculate();
            } else { alert("ຂໍ້ມູນບໍ່ຖືກຕ້ອງ"); btn.innerText = "ຢືນຢັນການເຂົ້າໃຊ້"; btn.disabled = false; }
        } catch(e) { alert("Error connecting"); btn.disabled = false; }
    }

    async function logout() {
        if(currentUnit) navigator.sendBeacon(SCRIPT_URL, JSON.stringify({unit:currentUnit, action:"logout"}));
        location.reload();
    }

    window.addEventListener('beforeunload', () => { if(currentUnit) navigator.sendBeacon(SCRIPT_URL, JSON.stringify({unit:currentUnit, action:"logout"})); });

    function switchTab(btn, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(id).classList.add('active');
    }

    function formatCur(el) {
        let v = el.value.replace(/[^0-9]/g, '');
        el.value = v !== '' ? Number(v).toLocaleString() : '';
        calculate();
    }

    function calculate() {
        const rank = parseFloat(document.getElementById('rank').value) || 0;
        const promo = rank * 0.3;
        const pos = parseFloat(document.getElementById('pos').value) || 0;
        const years = parseInt(document.getElementById('years').value) || 0;
        let yB = (years <= 5) ? years*10000 : 50000 + (years-5)*20000;
        const deg = parseFloat(document.getElementById('deg').value) || 0;
        const wife = parseFloat(document.getElementById('wife').value) || 0;
        const child = (parseInt(document.getElementById('child').value) || 0) * 200000;
        const eat = parseFloat(document.getElementById('eat').value.replace(/,/g,'')) || 0;
        const util = parseFloat(document.getElementById('util').value) || 0;
        const other = parseFloat(document.getElementById('other').value) || 0;
        const food = parseFloat(document.getElementById('food').value) || 0;
        const base = rank + promo + pos + yB;
        const soc = base * 0.08;
        const fmt = n => Math.round(n).toLocaleString();
        const incTot = base + deg + wife + child + eat;
        const dedTot = soc + util + other + food;
        document.getElementById('res_inc_side').innerHTML = `<div style="font-size:0.7em; color:var(--accent-light); margin-bottom:5px;">ລາຍຮັບລວມ</div><div class="res-row"><span>ຮັບທັງໝົດ</span><b class="pos">+${fmt(incTot)}</b></div>`;
        document.getElementById('res_ded_side').innerHTML = `<div style="font-size:0.7em; color:var(--accent-light); margin-bottom:5px;">ລາຍຫັກລວມ</div><div class="res-row"><span>ຫັກທັງໝົດ</span><b class="neg">-${fmt(dedTot)}</b></div>`;
        document.getElementById('res_net').innerText = fmt(incTot - dedTot) + ' ກີບ';
    }
</script>
</body>
</html>
